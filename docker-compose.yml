version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: mcqs_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mcqs_jcq
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: mcqs_backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=mcqs_jcq
      - PORT=3001
      - JWT_SECRET=mcqs_super_secret_jwt_key_2026
    depends_on:
      - database
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mcqs_frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
